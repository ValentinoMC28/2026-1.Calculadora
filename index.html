<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="px-4 pt-4">
    <div>
        <input type="text" class="border w-full h-16 px-4 text-end"/>
    </div>
    <div class="grid grid-cols-4 pt-4 gap-1 px-4">
        <button class="border bg-gray-100 rounded-md border-gray-300 h-16 text-2xl hover:bg-gray-300" type="button">1</button>
        <button class="border bg-gray-100 rounded-md border-gray-300 h-16 text-2xl hover:bg-gray-300" type="button">2</button>
        <button class="border bg-gray-100 rounded-md border-gray-300 h-16 text-2xl hover:bg-gray-300" type="button">3</button>
        <button class="border bg-gray-100 rounded-md border-gray-300 h-16 text-2xl hover:bg-gray-300" type="button">+</button>
        <button class="border bg-gray-100 rounded-md border-gray-300 h-16 text-2xl hover:bg-gray-300" type="button">4</button>
        <button class="border bg-gray-100 rounded-md border-gray-300 h-16 text-2xl hover:bg-gray-300" type="button">5</button>
        <button class="border bg-gray-100 rounded-md border-gray-300 h-16 text-2xl hover:bg-gray-300" type="button">6</button>
        <button class="border bg-gray-100 rounded-md border-gray-300 h-16 text-2xl hover:bg-gray-300" type="button">-</button>
        <button class="border bg-gray-100 rounded-md border-gray-300 h-16 text-2xl hover:bg-gray-300" type="button">7</button>
        <button class="border bg-gray-100 rounded-md border-gray-300 h-16 text-2xl hover:bg-gray-300" type="button">8</button>
        <button class="border bg-gray-100 rounded-md border-gray-300 h-16 text-2xl hover:bg-gray-300" type="button">9</button>
        <button class="border bg-gray-100 rounded-md border-gray-300 h-16 text-2xl hover:bg-gray-300" type="button">*</button>
        <button class="border bg-gray-100 rounded-md border-gray-300 h-16 text-2xl hover:bg-gray-300" type="button">0</button>
        <button class="border bg-gray-100 rounded-md border-gray-300 h-16 text-2xl hover:bg-gray-300" type="button">C</button>
        <button class="border bg-gray-100 rounded-md border-gray-300 h-16 text-2xl hover:bg-gray-300" type="button">=</button>
        <button class="border bg-gray-100 rounded-md border-gray-300 h-16 text-2xl hover:bg-gray-300" type="button">/</button>
    </div>
</body>
</html>
